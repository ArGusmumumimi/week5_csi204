<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab 9 - Mortgage Calculator</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f8fafc;
            padding: 30px;
            display: flex;
            justify-content: center;
            color: #1e293b;
        }
        .container {
            background-color: #ffffff;
            padding: 35px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 850px;
        }
        h2 {
            text-align: center;
            color: #0f172a;
            margin-bottom: 30px;
            font-size: 1.6rem;
        }
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 25px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #475569;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 12px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-size: 1rem;
            box-sizing: border-box;
            background-color: #f1f5f9;
            transition: all 0.3s;
        }
        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: #2563eb;
            background-color: #fff;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }
        .form-group input[readonly] {
            background-color: #e2e8f0;
            color: #64748b;
            font-weight: bold;
            cursor: not-allowed;
        }
        .btn-calc {
            width: 100%;
            padding: 14px;
            background-color: #2563eb;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
            margin-bottom: 30px;
        }
        .btn-calc:hover { background-color: #1d4ed8; }

        .result-box {
            background-color: #f0fdf4;
            border: 1px solid #bbf7d0;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 30px;
            display: none;
        }
        .result-title {
            font-size: 1.2rem;
            font-weight: bold;
            color: #166534;
            margin-bottom: 15px;
            border-bottom: 2px solid #bbf7d0;
            padding-bottom: 5px;
        }
        .result-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }
        .result-item {
            font-size: 0.95rem;
            color: #1e3a8a;
        }
        .result-item span {
            font-weight: bold;
            font-size: 1.1rem;
            color: #0f172a;
            display: block;
            margin-top: 4px;
        }

        .table-responsive {
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
            display: none;
        }
        th, td {
            padding: 12px;
            text-align: right;
            border: 1px solid #e2e8f0;
            font-size: 0.95rem;
        }
        th {
            background-color: #0f172a;
            color: #ffffff;
            font-weight: 500;
            text-align: center;
        }
        th:first-child, td:first-child { text-align: center; }
        tr:nth-child(even) { background-color: #f8fafc; }
        .error-message {
            color: #dc2626;
            background-color: #fef2f2;
            border: 1px solid #fca5a5;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2> ระบบคำนวณสินเชื่อบ้านแบบลดต้นลดดอก</h2>

        <div id="errorBox" class="error-message"></div>

        <div class="form-grid">
            <div class="form-group">
                <label for="homePrice">ราคาบ้าน (บาท):</label>
                <input type="number" id="homePrice" value="3000000" oninput="calculateLoanAmount()">
            </div>
            <div class="form-group">
                <label for="downPayment">เงินดาวน์ (บาท):</label>
                <input type="number" id="downPayment" value="300000" oninput="calculateLoanAmount()">
            </div>
            <div class="form-group">
                <label for="loanAmount">วงเงินกู้สุทธิ (คำนวณอัตโนมัติ):</label>
                <input type="text" id="loanAmount" readonly>
            </div>
            <div class="form-group">
                <label for="interestRate">อัตราดอกเบี้ย (% ต่อปี):</label>
                <input type="number" id="interestRate" value="5" step="0.01">
            </div>
            <div class="form-group">
                <label for="years">ระยะเวลาผ่อนชำระ:</label>
                <select id="years">
                    <option value="10">10 ปี</option>
                    <option value="20">20 ปี</option>
                    <option value="30" selected>30 ปี</option>
                </select>
            </div>
        </div>

        <button class="btn-calc" onclick="processMortgage()"> คำนวณสินเชื่อบ้าน</button>

        <div id="resultBox" class="result-box">
            <div class="result-title"> สรุปผลการคำนวณสินเชื่อ</div>
            <div class="result-grid">
                <div class="result-item">วงเงินกู้สุทธิ: <span id="resLoan"></span></div>
                <div class="result-item">จำนวนงวดทั้งหมด: <span id="resTotalMonths"></span></div>
                <div class="result-item">ค่างวดต่อเดือน (ประมาณ): <span id="resMonthly"></span></div>
                <div class="result-item">ดอกเบี้ยรวมทั้งสัญญา: <span id="resTotalInterest"></span></div>
                <div class="result-item">ยอดชำระรวมทั้งหมด: <span id="resTotalPayment"></span></div>
            </div>
        </div>

        <div class="table-responsive">
            <table id="amortizationTable">
                <thead>
                    <tr>
                        <th>งวด</th>
                        <th>เงินต้น</th>
                        <th>ดอกเบี้ย</th>
                        <th>ยอดชำระ</th>
                        <th>คงเหลือ</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>

    <script src="house_loan_calculator.js"></script>
</body>
</html>
