<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab 7.1 - ระบบจัดการข้อมูลนักเรียน</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f1f5f9;
            padding: 30px;
            display: flex;
            justify-content: center;
        }
        .container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.08);
            width: 100%;
            max-width: 650px;
        }
        h2 {
            text-align: center;
            color: #0f172a;
            margin-bottom: 20px;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #3b82f6;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
            margin-bottom: 20px;
        }
        button:hover {
            background-color: #2563eb;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
            margin-bottom: 20px;
        }
        th, td {
            padding: 10px;
            text-align: center;
            border: 1px solid #cbd5e1;
        }
        th {
            background-color: #f8fafc;
            color: #475569;
            font-weight: 600;
        }
        .info-box {
            background-color: #eff6ff;
            border-left: 5px solid #3b82f6;
            padding: 15px;
            border-radius: 6px;
            color: #1e3a8a;
            font-weight: 500;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>ระบบจัดการข้อมูลนักเรียน (7.1)</h2>
        

        <button onclick="displayStudents()">ดึงข้อมูลและประมวลผล</button>


        <div id="studentTable"></div>


        <div class="info-box" id="gradeA">
            คลิกปุ่มด้านบนเพื่อคำนวณรายชื่อนักเรียนที่ได้เกรด A
        </div>
    </div>


    <script src="lab7_1.js"></script>
</body>
</html>
