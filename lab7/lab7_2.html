<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab 7.2 - JSON & Array Methods</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f1f5f9;
            padding: 30px;
            display: flex;
            justify-content: center;
        }
        .container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.08);
            width: 100%;
            max-width: 700px;
        }
        h2 {
            text-align: center;
            color: #0f172a;
            margin-bottom: 20px;
        }
        .section-box {
            background-color: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
        }
        .section-title {
            font-weight: bold;
            color: #334155;
            margin-bottom: 10px;
            border-bottom: 2px solid #cbd5e1;
            padding-bottom: 4px;
        }
        .btn-group {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }
        button {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-primary { background-color: #3b82f6; color: white; }
        .btn-primary:hover { background-color: #2563eb; }
        .btn-success { background-color: #10b981; color: white; }
        .btn-success:hover { background-color: #059669; }
        .btn-warning { background-color: #f59e0b; color: white; }
        .btn-warning:hover { background-color: #d97706; }
        
        textarea {
            width: 100%;
            height: 80px;
            font-family: monospace;
            padding: 8px;
            border-radius: 6px;
            border: 1px solid #cbd5e1;
            box-sizing: border-box;
            background-color: #1e293b;
            color: #38bdf8;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        th, td {
            padding: 10px;
            text-align: left;
            border-bottom: 1px solid #e2e8f0;
        }
        th { background-color: #edf2f7; color: #4a5568; }
        #importFile { display: none; }
    </style>
</head>
<body>

    <div class="container">
        <h2>ระบบนำเข้า/ส่งออกข้อมูลสินค้า (7.2)</h2>


        <div class="section-box">
            <div class="section-title"> Export / Import ไฟล์ JSON</div>
            <div class="btn-group">
                <button class="btn-success" onclick="exportJSON()"> ดาวน์โหลดไฟล์ JSON (Export)</button>
                <button class="btn-warning" onclick="document.getElementById('importFile').click()"> อัปโหลดไฟล์ JSON (Import)</button>
                <input type="file" id="importFile" accept=".json" onchange="importJSON(event)">
            </div>
        </div>


        <div class="section-box">
            <div class="section-title">สถานะ JSON</div>
            <div class="btn-group">
                <button class="btn-primary" onclick="convertObjectToJSONString()">Object  JSON String</button>
                <button class="btn-primary" onclick="convertJSONStringToObject()">JSON String  Object</button>
            </div>
            <label style="font-size: 0.85rem; color:#64748b; font-weight:600;">กล่องแสดงผล JSON String:</label>
            <textarea id="jsonTextArea" placeholder="คลิกปุ่มด้านบนเพื่อแปลงสถานะข้อมูล..."></textarea>
        </div>


        <div class="section-box">
            <div class="section-title"> ขั้นตอนที่ 4 - 7: ใช้งาน Array Methods</div>
            <div class="btn-group">
                <button class="btn-primary" onclick="processForEach()">1. แสดงตาราง (forEach)</button>
                <button class="btn-primary" onclick="processMap()">2. ปรับโครงสร้างเพิ่มภาษี (map)</button>
                <button class="btn-primary" onclick="processFilter()">3. กรองเฉพาะราคา > 1500 (filter)</button>
                <button class="btn-primary" onclick="processReduce()">4. คำนวณราคารวม (reduce)</button>
            </div>


            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>ชื่อสินค้า</th>
                        <th>ราคา (บาท)</th>
                    </tr>
                </thead>
                <tbody id="productDisplayBody">
                    <tr><td colspan="3" style="text-align: center; color:#94a3b8;">กดปุ่มด้านบนเพื่อประมวลผลข้อมูล</td></tr>
                </tbody>
            </table>

            <div id="summaryBox" style="margin-top: 15px; font-weight: bold; color: #1e3a8a; text-align: right;"></div>
        </div>
    </div>


    <script src="lab7_2.js"></script>
</body>
</html>
