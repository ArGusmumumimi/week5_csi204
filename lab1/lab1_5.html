<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab 1.5 - LocalStorage Form</title>
    <style>
        body {
            font-family: sans-serif;
            background-color: #f4f6f9;
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .form-container, .display-container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 450px;
            margin-bottom: 20px;
        }
        h2, h3 {
            margin-bottom: 20px;
            color: #1e293b;
            text-align: center;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #4b5563;
        }
        .form-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #d1d5db;
            border-radius: 4px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #3b82f6;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 1rem;
            cursor: pointer;
            font-weight: bold;
            margin-bottom: 10px;
        }
        button:hover {
            background-color: #2563eb;
        }
        button.clear-btn {
            background-color: #ef4444;
        }
        button.clear-btn:hover {
            background-color: #dc2626;
        }
        ul {
            padding-left: 20px;
            color: #334155;
        }
        li {
            margin-bottom: 8px;
            font-family: monospace;
            font-size: 0.95rem;
        }
    </style>
</head>
<body>


    <div class="form-container">
        <h2>สมัครสมาชิก (Register)</h2>
        <form onsubmit="return validateForm()">
            <div class="form-group">
                <label for="name">ชื่อ-นามสกุล:</label>
                <input type="text" id="name" placeholder="กรอกชื่อของคุณ">
            </div>
            
            <div class="form-group">
                <label for="email">อีเมล:</label>
                <input type="text" id="email" placeholder="example@spu.ac.th">
            </div>

            <div class="form-group">
                <label for="phone">เบอร์โทรศัพท์:</label>
                <input type="text" id="phone" placeholder="กรอกเบอร์โทร 10 หลัก">
            </div>

            <div class="form-group">
                <label for="password">รหัสผ่าน:</label>
                <input type="password" id="password" placeholder="อย่างน้อย 6 ตัวอักษร">
            </div>

            <button type="submit">ลงทะเบียน</button>
        </form>
        

        <button class="clear-btn" onclick="clearStorage()">ลบข้อมูลใน localStorage</button>
    </div>


    <div class="display-container">
        <div id="userList"></div>
    </div>

    <script src="lab1_5.js"></script>
</body>
</html>
