<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio Page</title>
    <style>

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f4f6f9;
            color: #333;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }


        header {
            background-color: #1e293b;
            color: #ffffff;
            padding: 20px;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        header h1 {
            font-size: 1.8rem;
            letter-spacing: 1px;
        }


        .container {
            flex: 1;
            max-width: 600px;
            width: 100%;
            margin: 40px auto;
            background-color: #ffffff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            text-align: center;
        }

        .profile-img {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 20px;
            border: 4px solid #3b82f6;
            background-color: #e2e8f0;
        }

        .info-card h2 {
            color: #1e293b;
            margin-bottom: 5px;
            font-size: 1.5rem;
        }

        
        .info-card p {
            color: #64748b;
            line-height: 1.6;
        }


        footer {
            background-color: #0f172a;
            color: #94a3b8;
            text-align: center;
            padding: 15px;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <header>
        <h1>My Profile</h1>
    </header>

    <div class="container">
        <img class="profile-img" src="img/profile.jpg" alt="Profile Image">
        
        <div class="info-card">
            <h2>ยศพล เปี่ยมบางแวก</h2>
            <p>รหัสนักศึกษา: 66097958</p>
            <p>คณะเทคโนโลยีสารสนเทศ </p>
            <p>สาขาวิทยาการคอมพิวเตอร์และนวัตกรรมการพัฒนาซอฟต์แวร์</p>
        </div>
    </div>


    <footer>
        <p>&copy; 2026 | CSI204 </p>
    </footer>

</body>
</html>
