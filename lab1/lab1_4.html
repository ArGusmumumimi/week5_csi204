<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab 1.4 - Form Validation</title>
    <style>
        body {
            font-family: sans-serif;
            background-color: #f4f6f9;
            padding: 40px;
            display: flex;
            justify-content: center;
        }
        .form-container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
        }
        h2 {
            margin-bottom: 20px;
            color: #1e293b;
            text-align: center;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #4b5563;
        }
        .form-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #d1d5db;
            border-radius: 4px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #2e78fa;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 1rem;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover {
            background-color: #2563eb;
        }
    </style>
</head>
<body>

    <div class="form-container">
        <h2>สมัครสมาชิก</h2>
 
        <form onsubmit="return validateForm()">
            <div class="form-group">
                <label for="name">ชื่อ-นามสกุล:</label>
                <input type="text" id="name" placeholder="กรอกชื่อของคุณ">
            </div>
            
            <div class="form-group">
                <label for="email">อีเมล:</label>
                <input type="text" id="email" placeholder="example@example.com">
            </div>

            <div class="form-group">
                <label for="phone">เบอร์โทรศัพท์:</label>
                <input type="text" id="phone" placeholder="กรอกเบอร์โทรศัพท์ 10 หลัก">
            </div>

            <div class="form-group">
                <label for="password">รหัสผ่าน:</label>
                <input type="password" id="password" placeholder="อย่างน้อย 6 ตัวอักษร">
            </div>

            <button type="submit">ลงทะเบียน</button>
        </form>
    </div>

    <!-- เชื่อมโยงไฟล์ตรวจสอบ JavaScript -->
    <script src="lab1_4.js"></script>
</body>
</html>
