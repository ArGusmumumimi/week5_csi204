<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab 5.2 - ระบบคำนวณค่าส่ง</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f1f5f9;
            padding: 30px;
            display: flex;
            justify-content: center;
        }
        .container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.08);
            width: 100%;
            max-width: 450px;
        }
        h2 {
            text-align: center;
            color: #0f172a;
            margin-bottom: 25px;
        }
        .form-group {
            margin-bottom: 18px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #334155;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 10px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-size: 1rem;
            box-sizing: border-box;
        }
        .info-tag {
            background-color: #f0fdf4;
            border: 1px solid #bbf7d0;
            padding: 8px;
            border-radius: 6px;
            font-size: 0.85rem;
            color: #166534;
            margin-bottom: 15px;
            text-align: center;
            font-weight: 500;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #10b981;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover {
            background-color: #059669;
        }
        .result-box {
            background-color: #f8fafc;
            padding: 20px;
            border-radius: 8px;
            border-left: 5px solid #10b981;
            margin-top: 25px;
        }
        .result-box p {
            margin: 8px 0;
            color: #475569;
            display: flex;
            justify-content: space-between;
        }
        .free-shipping {
            color: #10b981;
            font-weight: bold;
        }
        .original-shipping {
            text-decoration: line-through;
            color: #94a3b8;
            margin-right: 5px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>ระบบคำนวณค่าจัดส่ง (5.2)</h2>
        
        <div class="info-tag">
            โปรโมชันพิเศษ: ซื้อสินค้าครบ 500 บาท ส่งฟรี!
        </div>


        <div class="form-group">
            <label for="productPrice">ราคาสินค้าทั้งหมด (บาท):</label>
            <input type="number" id="productPrice" placeholder="กรอกราคาสินค้า เช่น 350" min="0" required>
        </div>


        <div class="form-group">
            <label for="shippingMethod">รูปแบบการจัดส่ง:</label>
            <select id="shippingMethod">
                <option value="50">EMS (50 บาท)</option>
                <option value="30">ลงทะเบียน (30 บาท)</option>
                <option value="15">ธรรมดา (15 บาท)</option>
            </select>
        </div>

        <button onclick="calculateTotalWithShipping()">คำนวณราคารวม</button>


        <div id="resultBox" style="display: none;"></div>
    </div>


    <script src="lab5_2.js"></script>
</body>
</html>
