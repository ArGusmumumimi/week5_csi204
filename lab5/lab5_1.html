<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบคำนวณราคาสินค้าพร้อมส่วนลด</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f1f5f9;
            padding: 30px;
            display: flex;
            justify-content: center;
        }
        .container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.08);
            width: 100%;
            max-width: 500px;
        }
        h2 {
            text-align: center;
            color: #0f172a;
            margin-bottom: 20px;
        }
        .info-tag {
            background-color: #f8fafc;
            border: 1px solid #e2e8f0;
            padding: 10px;
            border-radius: 6px;
            font-size: 0.85rem;
            color: #64748b;
            margin-bottom: 20px;
            text-align: center;
        }
        .product-list {
            margin-bottom: 25px;
        }
        .product-item {
            display: flex;
            align-items: center;
            padding: 12px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            margin-bottom: 10px;
            background-color: #ffffff;
            transition: background-color 0.2s;
        }
        .product-item:hover {
            background-color: #f8fafc;
        }
        .product-item input[type="checkbox"] {
            width: 18px;
            height: 18px;
            margin-right: 15px;
            cursor: pointer;
        }
        .product-details {
            display: flex;
            justify-content: space-between;
            width: 100%;
            font-weight: 500;
            color: #334155;
        }
        .product-price {
            color: #10b981;
            font-weight: bold;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #4f46e5;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover {
            background-color: #4338ca;
        }
        .receipt-box {
            background-color: #f8fafc;
            padding: 20px;
            border-radius: 8px;
            border-left: 5px solid #4f46e5;
            margin-top: 25px;
        }
        .receipt-box p {
            margin: 8px 0;
            color: #475569;
            display: flex;
            justify-content: space-between;
        }
        .receipt-box .discount-text {
            color: #ef4444;
        }
        .receipt-box .final-total {
            font-size: 1.2rem;
            color: #4f46e5;
            border-top: 1px dashed #cbd5e1;
            padding-top: 10px;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>ระบบคำนวณราคาสินค้า (5.1)</h2>
        <div class="info-tag">
            เงื่อนไข: ซื้อครบ 500 บาทขึ้นไป ลด 10% | ครบ 1,000 บาทขึ้นไป ลด 15%
        </div>


        <div class="product-list" id="productListContainer"></div>


        <button onclick="calculateTotalPrice()">คำนวณยอดเงินรวม</button>


        <div id="receiptResult" style="display: none;"></div>
    </div>


    <script src="lab5_1.js"></script>
</body>
</html>
