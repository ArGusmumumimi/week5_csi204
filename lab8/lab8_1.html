<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab 8.1 - ระบบคำนวณสินเชื่อ</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f1f5f9;
            padding: 30px;
            display: flex;
            justify-content: center;
        }
        .container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.08);
            width: 100%;
            max-width: 750px;
        }
        h2 {
            text-align: center;
            color: #0f172a;
            margin-bottom: 25px;
        }
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #334155;
        }
        .form-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-size: 1rem;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #0ea5e9;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
            margin-bottom: 25px;
        }
        button:hover {
            background-color: #0284c7;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }
        th, td {
            padding: 10px;
            text-align: center;
            border: 1px solid #cbd5e1;
        }
        th {
            background-color: #f8fafc;
            color: #475569;
            font-weight: 600;
        }
        .summary-box {
            background-color: #f0fdf4;
            border-left: 5px solid #22c55e;
            padding: 15px;
            border-radius: 6px;
            margin-top: 20px;
            color: #14532d;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>ระบบคำนวณสินเชื่อและการผ่อนชำระ (8.1)</h2>


        <div class="form-grid">
            <div class="form-group">
                <label for="loanAmount">จำนวนเงินกู้ (บาท):</label>
                <input type="number" id="loanAmount" value="100000" placeholder="ตัวอย่าง 100000">
            </div>
            <div class="form-group">
                <label for="interestRate">อัตราดอกเบี้ยต่อปี (%):</label>
                <input type="number" id="interestRate" value="5" step="0.1" placeholder="ตัวอย่าง 5">
            </div>
            <div class="form-group">
                <label for="months">ระยะเวลาผ่อน (เดือน):</label>
                <input type="number" id="months" value="12" placeholder="ตัวอย่าง 12">
            </div>
        </div>

        <button onclick="generateAmortizationTable()">คำนวณตารางผ่อนชำระ</button>


        <div id="tableContainer"></div>


        <div id="summaryContainer"></div>
    </div>


    <script src="lab8_1.js"></script>
</body>
</html>
