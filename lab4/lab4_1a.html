<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>บันทึกข้อมูลส่วนตัว</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f1f5f9;
            padding: 30px;
            display: flex;
            justify-content: center;
        }
        .form-container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.08);
            width: 100%;
            max-width: 450px;
        }
        h2 {
            text-align: center;
            color: #334155;
            margin-bottom: 25px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            color: #475569;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 10px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-size: 1rem;
            box-sizing: border-box;
        }
        .btn-submit {
            width: 100%;
            padding: 12px;
            background-color: #4f46e5;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: background 0.2s;
        }
        .btn-submit:hover {
            background-color: #4338ca;
        }
        .link-next {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #4f46e5;
            text-decoration: none;
            font-weight: 600;
        }
        .link-next:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="form-container">
        <h2>ฟอร์มเก็บข้อมูลส่วนตัว (4.1a)</h2>
        

        <div class="form-group">
            <label for="username">ชื่อ-นามสกุล:</label>
            <input type="text" id="username" placeholder="กรอกชื่อของคุณ">
        </div>

        <div class="form-group">
            <label for="email">อีเมล:</label>
            <input type="email" id="email" placeholder="example@spu.ac.th">
        </div>

        <div class="form-group">
            <label for="phone">เบอร์โทรศัพท์:</label>
            <input type="tel" id="phone" placeholder="เช่น 098XXXXXXXX">
        </div>

        <div class="form-group">
            <label for="themeSelect">เลือก Theme เริ่มต้น:</label>
            <select id="themeSelect">
                <option value="light">สว่าง (Light Mode)</option>
                <option value="dark">มืด (Dark Mode)</option>
                <option value="ocean">มหาสมุทร (Ocean Blue)</option>
            </select>
        </div>

        <button class="btn-submit" onclick="saveToLocalStorage()">บันทึกข้อมูล</button>
        

        <a href="lab4_1b.html" class="link-next">ไปหน้าแสดงผลข้อมูล (lab4_1b.html)</a>
    </div>

    <script>
        function saveToLocalStorage() {
            let username = document.getElementById("username").value;
            let email = document.getElementById("email").value;
            let phone = document.getElementById("phone").value;
            let theme = document.getElementById("themeSelect").value;

            if (!username || !email || !phone) {
                alert("กรุณากรอกข้อมูลให้ครบถ้วนก่อนบันทึกครับ");
                return;
            }


            localStorage.setItem("user_name", username);
            localStorage.setItem("user_email", email);
            localStorage.setItem("user_phone", phone);
            localStorage.setItem("user_theme", theme);

            alert("บันทึกข้อมูลลง localStorage เรียบร้อยแล้วครับ!");
        }
    </script>
</body>
</html>
