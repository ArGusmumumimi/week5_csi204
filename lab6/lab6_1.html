<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab 6.1 - ระบบแปลงหน่วย</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f1f5f9;
            padding: 30px;
            display: flex;
            justify-content: center;
        }
        .container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.08);
            width: 100%;
            max-width: 450px;
        }
        h2 {
            text-align: center;
            color: #0f172a;
            margin-bottom: 25px;
        }
        .form-group {
            margin-bottom: 18px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #334155;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 10px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-size: 1rem;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #6366f1;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover {
            background-color: #4f46e5;
        }
        .result-box {
            background-color: #f8fafc;
            padding: 18px;
            border-radius: 8px;
            border-left: 5px solid #6366f1;
            margin-top: 25px;
            font-size: 1.1rem;
            font-weight: 500;
            color: #1e293b;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>ระบบแปลงหน่วย (6.1)</h2>

        
        <div class="form-group">
            <label for="convertType">เลือกประเภทการแปลง:</label>
            <select id="convertType">
                <option value="">-- กรุณาเลือก --</option>
                <option value="kgToLb">กิโลกรัม เป็น ปอนด์ (kg to lb)</option>
                <option value="cToF">เซลเซียส เป็น ฟาเรนไฮต์ (C to F)</option>
                <option value="kmToMile">กิโลเมตร เป็น ไมล์ (km to Mile)</option>
            </select>
        </div>

       
        <div class="form-group">
            <label for="inputValue">กรอกค่าที่ต้องการแปลง:</label>
            <input type="number" id="inputValue" placeholder="ตัวอย่างเช่น 10" step="any" required>
        </div>

        <button onclick="convert()">แปลงหน่วย</button>

       
        <div class="result-box" id="result">
            พื้นที่แสดงผลลัพธ์
        </div>
    </div>

    
    <script src="lab6_1.js"></script>
</body>
</html>
